name: Build Android APK

env:
  PROOT_VERSION: v5.3.0
  PROOT_ASSET: proot-v5.3.0-aarch64-static
  PROOT_SHA256: fa10b1a7818c2f5b1dcb5834450570c368c9ecf66d31521509621b95c4538a45

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src

    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Fetch static proot binary
        run: |
          mkdir -p app/src/main/assets/
          curl -fL --retry 3 --retry-delay 2 -o app/src/main/assets/proot "https://github.com/proot-me/proot/releases/download/${PROOT_VERSION}/${PROOT_ASSET}"
          echo "${PROOT_SHA256}  app/src/main/assets/proot" | sha256sum -c -

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: clu-box-release-apk
          path: Android/src/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
