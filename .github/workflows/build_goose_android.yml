name: Build goose-android

# Builds the upstream MaxFlynn13/goose-android reference app.
# Runs on every push/PR to verify the CLU/BOX Goose engine parity layer
# stays compatible with the upstream goose-android source.

on:
  push:
    branches: [ "main", "copilot/**" ]
    paths:
      - "Android/src/app/src/main/java/com/google/ai/edge/gallery/goose/**"
      - ".github/workflows/build_goose_android.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "Android/src/app/src/main/java/com/google/ai/edge/gallery/goose/**"
      - ".github/workflows/build_goose_android.yml"
  workflow_dispatch:

jobs:
  build-goose-android:
    name: Build goose-android (upstream reference)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out goose-android
        uses: actions/checkout@v4
        with:
          repository: MaxFlynn13/goose-android
          ref: main
          path: goose-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: goose-android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: goose-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-debug-apk
          path: goose-android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  build-clubox-with-goose:
    name: Build CLU/BOX (goose engine included)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out CLU/BOX
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: Android/src
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build CLU/BOX debug APK
        working-directory: Android/src
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.testInstrumentationRunnerArguments.annotation=androidx.test.filters.SmallTest

      - name: Upload CLU/BOX debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clubox-debug-apk
          path: Android/src/app/build/outputs/apk/debug/*.apk
          retention-days: 14
