name: CLU-BOX CI — Build & Package

on:
  push:
    branches: [ "main", "master", "copilot/**" ]
  pull_request:
    branches: [ "main", "master", "copilot/**" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info

      - name: Upload CLU-BOX Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clu-box-debug-apk
          path: Android/src/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
