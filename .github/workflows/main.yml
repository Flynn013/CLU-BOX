name: CLU-BOX CI — Build & Package

env:
  PROOT_VERSION: v5.3.0
  PROOT_ASSET: proot-v5.3.0-aarch64-static
  PROOT_SHA256: fa10b1a7818c2f5b1dcb5834450570c368c9ecf66d31521509621b95c4538a45

on:
  push:
    branches: [ "main", "master", "copilot/**" ]
  pull_request:
    branches: [ "main", "master", "copilot/**" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Fetch static proot binary
        run: |
          mkdir -p app/src/main/assets/
          curl -fL --retry 3 --retry-delay 2 -o app/src/main/assets/proot "https://github.com/proot-me/proot/releases/download/${PROOT_VERSION}/${PROOT_ASSET}"
          echo "${PROOT_SHA256}  app/src/main/assets/proot" | sha256sum -c -

      - name: Fetch BusyBox arm64 binary
        # The asset is optional — BusyBoxBridge gracefully falls back to
        # the device's /system/bin/sh when the APK asset is absent.
        # Use continue-on-error so a stale/moved upstream URL never blocks
        # the build; the binary will just not be bundled in that APK.
        continue-on-error: true
        run: |
          mkdir -p app/src/main/assets/busybox/
          curl -fL --retry 3 --retry-delay 2 \
            -o app/src/main/assets/busybox/busybox-arm64-v8a \
            "https://busybox.net/downloads/binaries/1.34.0-defconfig-multiarch-musl/busybox-aarch64" \
          || curl -fL --retry 2 \
            -o app/src/main/assets/busybox/busybox-arm64-v8a \
            "https://busybox.net/downloads/binaries/1.33.0-defconfig-multiarch-musl/busybox-aarch64" \
          || echo "BusyBox download skipped — app will use system shell fallback"
          if [ -f app/src/main/assets/busybox/busybox-arm64-v8a ]; then
            echo "Fetched BusyBox: $(wc -c < app/src/main/assets/busybox/busybox-arm64-v8a) bytes"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload CLU-BOX Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clu-box-debug-apk
          path: Android/src/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
